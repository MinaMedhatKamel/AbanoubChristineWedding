<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Envelope Opening</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory: #f6eee6;
    --rose: #a36c6b;
    --blush: #e5c5bf;
    --warm: #d8b7ac;
    --shadow: rgba(0, 0, 0, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at top, #f8eee4 0%, #ede1d8 45%, #ddc2b8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #5a3a37;
  }

  .scene {
    position: relative;
    width: min(420px, 90vw);
    perspective: 1200px;
  }

  .envelope {
    position: relative;
    width: 100%;
    height: 260px;
    margin: 0 auto;
    transform-style: preserve-3d;
  }

  .envelope .body {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #fef6ef 0%, #f4e6dd 100%);
    border: 1px solid rgba(112, 70, 69, 0.25);
    border-radius: 18px;
    box-shadow: 0 24px 40px rgba(0,0,0,0.12);
    overflow: hidden;
  }

  .envelope .body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top center, rgba(255,255,255,0.6), transparent 45%);
    pointer-events: none;
  }

  .envelope .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 140px;
    background: linear-gradient(180deg, #f2ded5 0%, #f7edeb 100%);
    border: 1px solid rgba(112, 70, 69, 0.25);
    border-bottom: none;
    clip-path: polygon(0 0, 100% 0, 100% 60%, 50% 100%, 0 60%);
    transform-origin: top center;
    animation: openFlap 1s ease-out 0.8s forwards;
    z-index: 2;
  }

  .envelope .flap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.55), transparent 42%);
  }

  .envelope .seal {
    position: absolute;
    top: 48px;
    left: 50%;
    transform: translateX(-50%);
    width: 86px;
    height: 86px;
    border-radius: 50%;
    background: radial-gradient(circle at top left, #f2d6cf, #c48b84);
    box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35), 0 10px 20px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    color: #5e322f;
    font-size: 2rem;
    letter-spacing: -0.05em;
  }

  .card {
    position: absolute;
    left: 50%;
    top: 42%;
    width: 86%;
    transform: translate(-50%, -50%);
    padding: 30px 24px;
    background: linear-gradient(180deg, #fffaf4 0%, #f4e9e2 100%);
    border: 1px solid rgba(112,70,69,0.2);
    border-radius: 20px;
    box-shadow: 0 32px 45px rgba(0,0,0,0.15);
    opacity: 0;
    transform: translate(-50%, 20%) scale(0.98);
    animation: slideCard 1s ease-out 1.5s forwards;
  }

  .card .headline {
    font-family: 'Playfair Display', serif;
    text-align: center;
    color: #6b3936;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
    font-size: 1.25rem;
  }

  .card .couple {
    font-family: 'Playfair Display', serif;
    color: #6b2420;
    font-size: 2.2rem;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 0.8rem;
  }

  .card .detail {
    text-align: center;
    color: #7d4e4a;
    font-size: 0.95rem;
    line-height: 1.8;
    margin-bottom: 0.75rem;
  }

  .card .date {
    font-family: 'Playfair Display', serif;
    color: #7a3533;
    font-size: 1.15rem;
    letter-spacing: 0.12em;
    margin-bottom: 0.5rem;
  }

  .card .venue {
    text-align: center;
    color: #6f403d;
    font-size: 0.92rem;
    margin-top: 0.5rem;
    opacity: 0.92;
  }

  .accent {
    position: absolute;
    bottom: -14px;
    left: 50%;
    width: 120%;
    max-width: 520px;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    gap: 18px;
  }

  .accent .petal {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at top left, rgba(255,255,255,0.85), rgba(163,108,107,0.27));
    box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
  }

  @keyframes openFlap {
    from { transform: rotateX(0deg); }
    to { transform: rotateX(-125deg); }
  }

  @keyframes slideCard {
    from { opacity: 0; transform: translate(-50%, 20%) scale(0.98); }
    to { opacity: 1; transform: translate(-50%, -12%) scale(1); }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="envelope">
      <div class="body"></div>
      <div class="flap">
        <div class="seal">AC</div>
      </div>
      <div class="card">
        <div class="headline">Together with their families</div>
        <div class="couple">ABANOUB<br>&amp;<br>CHRISTINE</div>
        <div class="detail">Invite you to celebrate their wedding</div>
        <div class="date">Saturday · May 2 · 2026</div>
        <div class="detail">At 6:00 PM</div>
        <div class="venue">Le Méridien Cairo Airport</div>
      </div>
    </div>
    <div class="accent">
      <div class="petal"></div>
      <div class="petal"></div>
      <div class="petal"></div>
    </div>
  </div>
</body>
</html>
